[project]
name = "defense-news-classifier"
version = "2.0.0"
description = "Classifies public defense-related news snippets into a category and an operational domain using an LLM with structured output."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "anthropic",
    "pandas",
    "rank-bm25>=0.2.2",
]

[dependency-groups]
dev = [
    "black",
    "mypy",
    "pandas-stubs",
    "pre-commit",
    "ruff",
    "pytest",
    "pytest-cov",
    "uv",
    "httpx",
    # Needed to import and test src/api.py (the FastAPI service). httpx, pulled
    # in transitively, provides the TestClient transport. These are serving
    # deps (see requirements-api.txt) but the test suite needs them too.
    "fastapi",
]
# Optional analysis extras — installed with `uv sync --group notebook`.
notebook = [
    "jupyter",
    "matplotlib",
    "seaborn",
]

[tool.mypy]
python_version = "3.11"
files = ["src"]
strict = false
ignore_missing_imports = true

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (unused imports, undefined names)
    "I",   # isort (import ordering)
    "UP",  # pyupgrade (modernise syntax)
]
ignore = [
    "E501",  # line too long — Black handles line length; strings/comments can't be auto-wrapped
]

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.uv]
# Keep the project lean: no build backend, this is a set of runnable scripts,
# not a published package.
package = false
