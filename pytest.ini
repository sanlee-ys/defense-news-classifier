[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra
markers =
    integration: end-to-end test needing Docker (Testcontainers). Deselected by default; run with --run-integration.
filterwarnings =
    # starlette's TestClient prefers httpx2 over plain httpx and warns otherwise;
    # we don't use httpx2 anywhere else, so mute this specific message rather than
    # take on a dependency with no functional use. Revisit if starlette ever turns
    # the fallback into a hard error instead of a warning.
    ignore:Using `httpx` with `starlette.testclient` is deprecated:starlette.exceptions.StarletteDeprecationWarning
