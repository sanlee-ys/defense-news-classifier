# Floors for the evals-as-CI capability gate (src/eval_gate.py). Parsed with Python's
# stdlib tomllib -- zero new dependencies.
#
# Same ratchet-upward philosophy as .github/workflows/tests.yml's `--cov-fail-under=66`:
# each floor sits a deliberate margin below the number currently committed in
# evals/gold_eval.txt and evals/gold_rag_eval.txt, so the gate holds the line without
# flapping red on today's numbers, and can be tightened as the eval scales past n=54
# (v2.1.0 -- see docs/how-it-works.md's threats-to-validity and
# decisions/007-evals-as-ci-gate.md). The ~5-7 point margin is sized for the LIVE gate's
# run-to-run noise (model calls are non-deterministic); the committed snapshot clears
# every floor here comfortably.

[baseline]
# vs src/gold_eval.py -- the workhorse (claude-sonnet-5) scored against human labels,
# and the Opus judge scored against human labels for agreement. This is the only gated
# check: BM25 retrieval grounding was retired in ADR-012 (it stopped paying under the
# improved prompt), so there is no [rag] table any more -- the gate grades the
# ungrounded classifier that actually ships.
# Committed today (evals/gold_eval_v3.txt, the first three-axis run):
# category_accuracy 0.926 (macro-F1 0.911), domain_accuracy 0.926 (macro-F1 0.933),
# region_accuracy 0.870 (macro-F1 0.927), judge agreement cat/dom/region
# 0.926 / 0.981 / 1.000. The v2 floors are kept unchanged (measured v3 numbers
# clear them all); the two region floors below are derived from the v3 run with
# the same deliberate live-noise margin.
category_accuracy = 0.83
category_macro_f1 = 0.85
domain_accuracy = 0.83
domain_macro_f1 = 0.83
judge_category_agreement = 0.83
judge_domain_agreement = 0.88
# Region floors (ADR-014: set from the measured 2026-07-18 live run, never
# aspirationally). region_accuracy 0.870 measured -> 0.78 floor (~9 pts, matching
# the category margin). judge_region_agreement 1.000 measured -> 0.93 floor
# (~7 pts; this floor guards the signal the v3.1.0 scaled eval stands on).
# There is deliberately NO region_macro_f1 floor: with europe support n=1, a
# single flipped row moves region macro-F1 by ~0.17 -- any floor would either be
# meaninglessly low or flap on noise. The per-label table in gold_eval_v3.txt is
# the honest view of that axis's tails.
region_accuracy = 0.78
judge_region_agreement = 0.93
