name: tests

# One lane on every push and PR:
#   - test: the offline unit suite (mocks the Anthropic API; no key or Docker needed).
# (A separate integration-test lane ran the Testcontainers Kafka round trip; it was
# removed in v2.0.1 along with the dead Kafka consumer it exercised — see CHANGELOG.)
on:
  push:
  pull_request:

permissions:
  contents: read

# Cancel an in-progress run if the same ref is pushed again.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # --frozen makes CI fail if uv.lock is out of date rather than silently
      # resolving new versions — keeps the reproducible-install guarantee honest.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        run: uv run black --check .

      - name: Type check (mypy)
        run: uv run mypy src

      # This repo is the PROVIDER on the SYS-004 /classify seam, so it publishes
      # contracts/classify-response.schema.json for consumers to assert against.
      # A stale artifact is worse than none — a consumer would validate against a
      # shape this service no longer returns. Fail the build rather than publish it.
      - name: Contract artifact is current (SYS-004)
        run: uv run python scripts/gen_contract_schema.py --check

      # The measured numbers are this project's headline claim and are quoted on
      # outward surfaces. evals/metrics.json is what those surfaces assert
      # against instead of retyping them; a stale artifact is worse than none,
      # because a consumer would verify against it and conclude wrong figures
      # are right.
      - name: Metrics artifact is current
        run: uv run python scripts/gen_metrics_artifact.py --check

      # --cov-fail-under gates the build on coverage. Set a few points below the
      # current total so it holds the line without breaking now, and can be
      # ratcheted upward as coverage improves.
      - name: Run tests
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=66
