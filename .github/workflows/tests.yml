name: tests

# Two lanes on every push and PR:
#   - test: the offline unit suite (mocks the Anthropic API; no key or Docker needed).
#   - integration-test: the Testcontainers Kafka round trip (needs Docker), in its own
#     job so pulling a broker image never blocks the fast unit feedback.
on:
  push:
  pull_request:

permissions:
  contents: read

# Cancel an in-progress run if the same ref is pushed again.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # --frozen makes CI fail if uv.lock is out of date rather than silently
      # resolving new versions — keeps the reproducible-install guarantee honest.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        run: uv run black --check .

      - name: Type check (mypy)
        run: uv run mypy src

      # --cov-fail-under gates the build on coverage. Set a few points below the
      # current total so it holds the line without breaking now, and can be
      # ratcheted upward as coverage improves.
      - name: Run tests
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=66

  # Runs the real note-events round trip against a Kafka broker started in Docker
  # (Testcontainers). Separate job: it pulls a broker image and is slow, so it must
  # not gate the fast unit feedback above. ubuntu-latest ships Docker, so the
  # Testcontainers broker just works. Mirrors notes-api running its IT in `./mvnw verify`.
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # Opt-in flag + marker: runs only the integration test (the unit suite is the
      # `test` job's responsibility). --run-integration is the gate defined in conftest.py.
      - name: Run integration tests (Testcontainers Kafka)
        run: uv run pytest --run-integration -m integration
