name: tests

# Run the offline unit suite on every push and PR. The tests mock the
# Anthropic API, so no API key/secret is needed in CI.
on:
  push:
  pull_request:

permissions:
  contents: read

# Cancel an in-progress run if the same ref is pushed again.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # --frozen makes CI fail if uv.lock is out of date rather than silently
      # resolving new versions — keeps the reproducible-install guarantee honest.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        run: uv run black --check .

      - name: Type check (mypy)
        run: uv run mypy src

      # --cov-fail-under gates the build on coverage. Set a few points below the
      # current total so it holds the line without breaking now, and can be
      # ratcheted upward as coverage improves.
      - name: Run tests
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=66
